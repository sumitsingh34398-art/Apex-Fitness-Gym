<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Members Management | Apex Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 40px; font-family: 'Poppins', sans-serif;
            /* Aapki di gayi professional background image */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('images/1000132265.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; min-height: 100vh;
        }
        
        h1 { text-align: center; color: #d4af37; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
        
        .members-container { 
            max-width: 1000px; margin: auto; background: rgba(0, 0, 0, 0.5); 
            padding: 30px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.4); 
            backdrop-filter: blur(15px); /* Premium Glass Effect */
        }
        
        .toolbar { display: flex; justify-content: space-between; margin-bottom: 25px; }
        input[type="text"] { 
            background: rgba(255,255,255,0.1); border: 1px solid #d4af37; color: #fff; 
            padding: 10px 15px; border-radius: 8px; width: 300px; 
        }
        
        table { width: 100%; border-collapse: collapse; }
        th { color: #d4af37; text-align: left; padding: 15px; border-bottom: 2px solid #d4af37; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .btn-add { background: #d4af37; color: #000; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; }
        .btn-view { color: #d4af37; text-decoration: none; font-weight: 600; border: 1px solid #d4af37; padding: 5px 10px; border-radius: 5px; }
        
        .btn-back { 
            display: block; width: 220px; margin: 40px auto; text-align: center; color: #000; 
            background: #d4af37; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: 600; 
        }
    </style>
</head>
<body>

    <h1>Member Management</h1>
    
    <div class="members-container">
        <div class="toolbar">
            <input type="text" placeholder="Search members by name or ID...">
            <a href="#" class="btn-add">+ Add New Member</a>
        </div>

        <table>
            <tr><th>Member ID</th><th>Name</th><th>Status</th><th>Action</th></tr>
            <tr><td>AF-9901</td><td>Rahul Kumar</td><td style="color:#4caf50;">Active</td><td><a href="#" class="btn-view">View</a></td></tr>
            <tr><td>AF-9902</td><td>Anita Verma</td><td style="color:#ff4d4d;">Expired</td><td><a href="#" class="btn-view">View</a></td></tr>
        </table>
    </div>

    <a href="dashboard.html" class="btn-back">Back to Dashboard</a>

</body>
</html>
