<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Apex Fitness</title>
    <!-- Google Font for Professional Look -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Oswald', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('images/hero.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .contact-container {
            width: 90%;
            max-width: 500px;
            background: rgba(26, 26, 26, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #ff5722;
            text-align: center;
        }
        h1 { color: #ff5722; margin-bottom: 20px; text-transform: uppercase; }
        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box; /* Responsive ke liye */
        }
        button {
            width: 100%;
            padding: 15px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background: #e64a19; }
        .back-btn { display: block; margin-top: 20px; color: #ff5722; text-decoration: none; }
    </style>
</head>
<body>

    <div class="contact-container">
        <h1>Get In Touch</h1>
        <p>Have questions? Reach out to us and our team will get back to you soon.</p>
        
        <!-- Formspree Form Integration -->
        <form action="https://formspree.io/f/xnjejjbv" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
            <button type="submit">SEND MESSAGE</button>
        </form>
        
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

</body>
</html>
