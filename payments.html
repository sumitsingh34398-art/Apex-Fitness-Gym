<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Payments | Apex Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 40px; font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('images/payments.png'); /* Yahan aap koi bhi gym background image use kar sakte hain */
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff;
        }
        h1 { text-align: center; color: #d4af37; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
        
        .payment-container { 
            max-width: 900px; margin: auto; background: rgba(0, 0, 0, 0.6); 
            padding: 30px; border-radius: 20px; border: 1px solid #d4af37; backdrop-filter: blur(10px);
        }
        
        .status-box { 
            display: flex; justify-content: space-between; background: rgba(212, 175, 55, 0.1); 
            padding: 20px; border-radius: 15px; border-left: 5px solid #d4af37; margin-bottom: 30px;
        }
        
        table { width: 100%; border-collapse: collapse; }
        th { color: #d4af37; text-align: left; padding: 15px; border-bottom: 2px solid #d4af37; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .btn { display: block; width: 220px; margin: 30px auto; text-align: center; color: #000; background: #d4af37; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        .due { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Payment Dashboard</h1>
    
    <div class="payment-container">
        <!-- Membership Status Summary -->
        <div class="status-box">
            <div>
                <p><strong>Membership Plan:</strong> Annual Gold</p>
                <p><strong>Status:</strong> <span style="color:#4caf50;">Active</span></p>
            </div>
            <div>
                <p><strong>Next Payment Due:</strong> <span class="due">15 August 2026</span></p>
                <p><strong>Amount:</strong> ₹2,500</p>
            </div>
        </div>

        <!-- Payment History Table -->
        <table>
            <tr><th>Date</th><th>Description</th><th>Amount</th><th>Status</th></tr>
            <tr><td>01 Jan 2026</td><td>Annual Membership</td><td>₹15,000</td><td>Paid</td></tr>
            <tr><td>01 Jun 2026</td><td>Diet Consultation</td><td>₹1,500</td><td>Paid</td></tr>
        </table>
    </div>

    <a href="dashboard.html" class="btn">Back to Dashboard</a>

</body>
</html>
