<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Gallery | Apex Fitness</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: 'Oswald', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        h1 { color: #ff5722; margin-bottom: 20px; }

        /* Carousel Container */
        .carousel { position: relative; width: 90%; max-width: 900px; height: 500px; overflow: hidden; border-radius: 15px; border: 3px solid #ff5722; }
        .carousel-images { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        
        .slide { position: relative; min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Caption Styling */
        .caption { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: #ff5722; text-align: center; padding: 20px 0; font-size: 24px; font-weight: bold; }

        /* Buttons */
        .btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255, 87, 34, 0.9); color: white; border: none; padding: 20px; cursor: pointer; font-size: 24px; border-radius: 5px; z-index: 10; }
        .prev { left: 10px; }
        .next { right: 10px; }

        /* Back Link */
        .back-btn { margin-top: 30px; color: #ff5722; text-decoration: none; font-size: 18px; }
    </style>
</head>
<body>

    <h1>Our Gym Gallery</h1>
    
    <div class="carousel">
        <div class="carousel-images" id="slider">
            <div class="slide"><img src="images/manager-office.png"><div class="caption">Manager Office</div></div>
            <div class="slide"><img src="images/dance-class.png"><div class="caption">Dance Class</div></div>
            <div class="slide"><img src="images/locker-room.png"><div class="caption">Locker Room</div></div>
            <div class="slide"><img src="images/yoga-studio.png"><div class="caption">Yoga Studio</div></div>
            <div class="slide"><img src="images/workout-zone.png"><div class="caption">Workout Zone</div></div>
            <div class="slide"><img src="images/trainers-team.png"><div class="caption">Our Trainers</div></div>
            <div class="slide"><img src="images/gym-floor.png"><div class="caption">Gym Floor</div></div>
        </div>
        <button class="btn prev" onclick="move(-1)">❮</button>
        <button class="btn next" onclick="move(1)">❯</button>
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>

    <script>
        let index = 0;
        function move(step) {
            const slider = document.getElementById('slider');
            const total = slider.children.length;
            index = (index + step + total) % total;
            slider.style.transform = `translateX(-${index * 100}%)`;
        }
    </script>
</body>
</html>
